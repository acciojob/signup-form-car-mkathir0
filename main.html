<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="/submit-data" method="post">
		<div>
			<label for="name">Name</label>
			<input type="text" id="name" name="name" placeholder="Name">
		</div>

		<div>
			<label for="name">Email</label>
			<input type="email" id="email" name="email" placeholder="Email">
		</div>

		<div>
			<label for="gender_m">Male</label>
			<label for="gender_f">Female</label>
			<input type="radio" id="gender" name="gender">
		</div>

		<div>
			<label for="cars">Car Brands</label>
			<input type="select" id="cars" name="cars" placeholder="--Please choose an option--">
		</div>

		<div>
			<label for="age">Age</label>
			<input type="number" id="age" name="cars" placeholder="Age">
		</div>

		<div>
			<label for="dob">Date of birth</label>
			<input type="date" id="dob" name="dob">
		</div>

		<div>
			<label for="tel">Phone number</label>
			<input type="number" id="tel" name="tel" placeholder="xxx-xxx-xxxx">
		</div>

		<div>
			<label for="password">Password</label>
			<input type="password" id="password" name="password" placeholder="Password">
		</div>

		<div>
			<label for="tos">I agree to the TOS</label>
			<input type="checkbox" id="tos" name="tos">
		</div>

		<div>
			<label for="submit">Submit</label>
			<input type="submit" id="submit" name="submit">
		</div>
			
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
